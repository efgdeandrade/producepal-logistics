  <body>
    <div id="root">
      <div id="boot-placeholder" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#fff;font-family:system-ui,sans-serif;font-size:1.25rem;">
        Loading app...
      </div>
    </div>
    
    <!-- Ultra-early error capture (runs before module) -->
    <script>
      (function() {
        var placeholder = document.getElementById('boot-placeholder');
        if (placeholder) placeholder.textContent = 'Inline JS OK; loading module...';
        
        function showError(msg) {
          var banner = document.getElementById('early-error-banner');
          if (!banner) {
            banner = document.createElement('div');
            banner.id = 'early-error-banner';
            banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#dc2626;color:white;padding:16px;font-family:monospace;font-size:14px;white-space:pre-wrap;max-height:50vh;overflow:auto;';
            document.body.prepend(banner);
          }
          banner.textContent = msg;
        }
        
        window.onerror = function(msg, src, line, col, err) {
          showError('[window.onerror] ' + msg + '\n' + (err && err.stack ? err.stack : src + ':' + line));
        };
        
        window.onunhandledrejection = function(e) {
          showError('[Unhandled Promise] ' + (e.reason && e.reason.stack ? e.reason.stack : e.reason));
        };
        
        // Unregister service workers to rule out stale cache
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(r) { r.unregister(); });
          });
        }
        
        window.__showBootError = showError;
      })();
    </script>
    
    <!-- Dynamic module import with fetch diagnostics -->
    <script type="module">
      (async function() {
        var modulePath = "./src/main.tsx";
        
        // Diagnostic: check what the server returns for this path
        try {
          var res = await fetch(modulePath);
          var contentType = res.headers.get("content-type") || "unknown";
          var statusInfo = "Status: " + res.status + " | Content-Type: " + contentType;
          console.log("[BOOT DIAG] " + statusInfo);
          
          if (!res.ok) {
            var body = await res.text();
            window.__showBootError("[Fetch Failed] " + statusInfo + "\n\nResponse (first 500 chars):\n" + body.slice(0, 500));
            return;
          }
          
          if (contentType.includes("text/html")) {
            var body = await res.text();
            window.__showBootError("[Wrong Content-Type] Server returned HTML instead of JS.\n" + statusInfo + "\n\nResponse (first 500 chars):\n" + body.slice(0, 500));
            return;
          }
        } catch (fetchErr) {
          window.__showBootError("[Fetch Error] Could not fetch module.\n" + (fetchErr.message || fetchErr));
          return;
        }
        
        // Now try the actual import with relative path
        try {
          await import(modulePath);
        } catch (err) {
          console.error('[Module Load Failed]', err);
          if (window.__showBootError) {
            window.__showBootError('[Module Load Failed]\n' + (err.stack || err.message || err));
          }
        }
      })();
    </script>
